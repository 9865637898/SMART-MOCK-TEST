<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal Satellite Quiz</title>
    <style>
        /* --- THEME: Space & Technology --- */
        :root {
            --bg-space: #0B0E14; 
            --card-dark: #151B25;
            --primary-blue: #3B82F6;
            --accent-purple: #8B5CF6;
            --correct-green: #10B981;
            --wrong-red: #EF4444;
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--bg-space);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
            color: var(--text-main);
        }

        /* Main Container */
        .app-wrapper {
            width: 100%;
            max-width: 600px;
            background: var(--card-dark);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            margin-top: 10px;
            min-height: 85vh;
            border: 1px solid #2d3748;
        }

        /* --- HOME SCREEN --- */
        #home-view {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            height: 100%;
        }

        h1 { 
            background: linear-gradient(to right, var(--primary-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem; margin-bottom: 10px; font-weight: 800; 
        }
        
        .sub-text { color: var(--text-muted); margin-bottom: 40px; font-size: 1.1rem; }

        .start-btn { 
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-purple)); 
            color: white; width: 100%; padding: 20px; 
            border-radius: 15px; border: none; font-size: 1.2rem; font-weight: bold; 
            cursor: pointer; margin-top: 15px; transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }
        .start-btn:active { transform: scale(0.98); }

        .retry-btn { 
            background: #374151; color: white; width: 100%; padding: 18px; 
            border-radius: 15px; border: 1px solid var(--wrong-red); font-size: 1.1rem; font-weight: bold; 
            cursor: pointer; margin-top: 15px; display: none; 
        }

        /* --- QUIZ SCREEN --- */
        #quiz-view { display: none; flex-direction: column; height: 100%; }

        #timer-display {
            background: #1F2937;
            color: var(--accent-purple);
            padding: 8px 20px;
            border-radius: 30px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 800;
            margin: 0 auto 15px auto;
            border: 1px solid var(--accent-purple);
            width: fit-content;
        }

        .prog-bar {
            text-align: center;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 25px;
            font-size: 0.95rem;
            border-bottom: 1px solid #374151;
            padding-bottom: 10px;
        }

        .question-box {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 30px;
            line-height: 1.5;
            text-align: left;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 1px solid #374151;
            background: #1F2937;
            font-size: 1.1rem;
            text-align: left;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        .option-btn:hover:not(.locked) { 
            border-color: var(--primary-blue); 
            background: #2D3748; 
        }

        .is-correct { background: rgba(16, 185, 129, 0.2) !important; border-color: var(--correct-green) !important; color: var(--correct-green) !important; }
        .is-wrong { background: rgba(239, 68, 68, 0.2) !important; border-color: var(--wrong-red) !important; color: var(--wrong-red) !important; }
        .locked { pointer-events: none; opacity: 0.8; }

        .explanation {
            margin-top: 25px;
            padding: 20px;
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--primary-blue);
            border-radius: 8px;
            display: none;
            font-size: 1rem;
            color: #93C5FD;
            line-height: 1.6;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-footer { margin-top: auto; padding-top: 25px; }

        #next-btn {
            width: 100%;
            padding: 18px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            display: none;
            cursor: pointer;
        }

        /* --- RESULT SCREEN --- */
        #result-view { display: none; text-align: center; flex-direction: column; justify-content: center; height: 100%; }
        
        .score-circle {
            width: 150px; height: 150px;
            background: transparent;
            color: var(--primary-blue);
            border: 5px solid var(--primary-blue);
            border-radius: 50%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 0 auto 30px auto;
            font-size: 3.5rem; font-weight: 900;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        #firework-overlay { position: fixed; top: 40%; width: 100%; text-align: center; font-size: 3rem; font-weight: 900; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.3s; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="firework-overlay"></div>

<div class="app-wrapper">
    <div id="home-view">
        <h1>Nepal Satellites</h1>
        <p class="sub-text">NepaliSat-1 & Slippers2Sat Quiz</p>
        <button class="start-btn" onclick="initQuiz('full')">Start Quiz (13 Questions)</button>
        <button id="home-retry-btn" class="retry-btn" onclick="initQuiz('wrong')">Retry Mistakes</button>
        <p id="mistake-count" style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); font-weight: bold;"></p>
    </div>

    <div id="quiz-view">
        <div id="timer-display">20:00</div>
        <div id="prog-text" class="prog-bar">Question: 1 / 13</div>
        
        <div style="flex-grow: 1; overflow-y: auto;">
            <div id="q-text" class="question-box">Loading...</div>
            <div id="opt-container" class="options-list"></div>
            <div id="exp-box" class="explanation"></div>
        </div>

        <div class="nav-footer">
            <button id="next-btn" onclick="nextQuestion()">Next Question ➜</button>
        </div>
    </div>

    <div id="result-view">
        <h2 style="color: var(--text-main); margin-bottom: 20px;">Mission Status</h2>
        <div class="score-circle">
            <span id="final-score">0</span>
            <span style="font-size: 1rem; color: var(--text-muted);">Score</span>
        </div>
        <p id="accuracy-text" style="margin-bottom: 40px; font-weight: bold; color: var(--text-muted); font-size: 1.2rem;">Accuracy: 0%</p>
        <button class="start-btn" onclick="location.reload()">Back to Base</button>
    </div>
</div>

<script>
    // --- DATABASE (13 Questions) ---
    var rawData = [
        { id: 1, q: "नेपालको पहिलो भू-उपग्रह 'नेपाली स्याट-१' (NepaliSat-1) कहिले प्रक्षेपण गरिएको थियो?", o: ["२०७५ वैशाख ५", "२०७६ वैशाख ५", "२०७६ जेठ ५", "२०७७ वैशाख ५"], cor: "२०७६ वैशाख ५", exp: "यो उपग्रह बिहान २:३१ बजे अमेरिकाको भर्जिनियाबाट प्रक्षेपण गरिएको थियो।" },
        { id: 2, q: "'नेपाली स्याट-१' निर्माण गर्ने दुई नेपाली वैज्ञानिकहरू को-को हुन्?", o: ["महावीर पुन र आभास मास्के", "आभास मास्के र हरिराम श्रेष्ठ", "सन्देश श्रेष्ठ र आभास मास्के", "हरिराम श्रेष्ठ र विजय धिमाल"], cor: "आभास मास्के र हरिराम श्रेष्ठ", exp: "उहाँहरूले जापानको क्युसु इन्स्टिच्युट अफ टेक्नोलोजीमा यो निर्माण गर्नुभएको हो।" },
        { id: 3, q: "नेपाली स्याट-१ कुन अन्तर्राष्ट्रिय परियोजना अन्तर्गत विकास गरिएको थियो?", o: ["BIRDS-3 Project", "NASA Space Program", "ISRO Satellite Project", "APN Research Project"], cor: "BIRDS-3 Project", exp: "यो परियोजना जापानको Kyutech विश्वविद्यालय अन्तर्गत सञ्चालित थियो।" },
        { id: 4, q: "नेपाली स्याट-१ को तौल र प्रक्षेपणका लागि प्रयोग गरिएको रकेट कुन हो?", o: ["१.० केजी र फाल्कोन-९", "१.३ केजी र एन्टारेस रकेट", "१.५ केजी र पीएसएलभी", "२.० केजी र लङ मार्च"], cor: "१.३ केजी र एन्टारेस रकेट", exp: "Antares Rocket मार्फत यसलाई अन्तर्राष्ट्रिय अन्तरिक्ष केन्द्र (ISS) मा पुर्‍याइएको थियो। " },
        { id: 5, q: "नेपाली स्याट-१ परियोजनाका लागि नेपाल सरकारले नास्ट (NAST) मार्फत कुल कति खर्च गरेको थियो?", o: ["करिब १० मिलियन (१ करोड)", "करिब १५ मिलियन (१.५ करोड)", "करिब २० मिलियन (२ करोड)", "करिब ५० मिलियन (५ करोड)"], cor: "करिब २० मिलियन (२ करोड)", exp: "यो नेपाल सरकारको लगानीमा निर्माण भएको थियो।" },
        { id: 6, q: "नेपालको विद्यार्थीहरूद्वारा निर्मित भू-उपग्रह 'Slippers2Sat' (S2S) कहिले प्रक्षेपण गरियो?", o: ["२०८२ मङ्सिर १०", "२०८२ मङ्सिर २०", "२०८२ मङ्सिर २४", "२०८२ पुस ५"], cor: "२०८२ मङ्सिर २४", exp: "यो नेपालको दोस्रो र विद्यार्थीले बनाएको पहिलो स्याटेलाइट हो।" },
        { id: 7, q: "Slippers2Sat निर्माणमा मुख्य रूपमा कुन समुदायका विद्यार्थीहरू सहभागी थिए?", o: ["थारु समुदाय", "चेपाङ समुदाय", "राउटे समुदाय", "तामाङ समुदाय"], cor: "चेपाङ समुदाय", exp: "चितवनको नवोदय मा.वि. का चेपाङ समुदायका ९ जना विद्यार्थीहरू यसमा सहभागी थिए।" },
        { id: 8, q: "Slippers2Sat प्रक्षेपणका लागि कुन रकेट र प्रक्षेपण स्थल प्रयोग गरिएको थियो?", o: ["एन्टारेस, अमेरिका", "केनेटिका-१ (Kinetica-1) र जियुक्वान, चीन", "फाल्कोन-९, अमेरिका", "पीएसएलभी, भारत"], cor: "केनेटिका-१ (Kinetica-1) र जियुक्वान, चीन", exp: "यो चीनको जियुक्वान स्याटेलाइट लन्च सेन्टरबाट प्रक्षेपण गरिएको हो। " },
        { id: 9, q: "Slippers2Sat को मुख्य वैज्ञानिक उद्देश्य के हो?", o: ["सैन्य जासुसी", "वनस्पति, जलस्रोत अनुगमन र भूकम्प पूर्व-सूचना", "सञ्चार सेवा विस्तार", "चन्द्रमाको सतहको फोटो खिच्ने"], cor: "वनस्पति, जलस्रोत अनुगमन र भूकम्प पूर्व-सूचना", exp: "यसले जलवायु परिवर्तन अध्ययनमा पनि सहयोग गर्नेछ।" },
        { id: 10, q: "Slippers2Sat को विकासको नेतृत्व कुन संस्थाले गरेको थियो?", o: ["नास्ट (NAST)", "नेपाल टेलिकम", "अन्तरिक्ष प्रतिष्ठान नेपाल (APN)", "त्रिभुवन विश्वविद्यालय"], cor: "अन्तरिक्ष प्रतिष्ठान नेपाल (APN)", exp: "डा. आभास मास्केको नेतृत्वमा रहेको APN ले यो परियोजना सञ्चालन गरेको हो।" },
        { id: 11, q: "Slippers2Sat कुन प्रकारको (Type) भू-उपग्रह हो?", o: ["1U CubeSat", "3U CubeSat", "PocketQube", "Micro-satellite"], cor: "1U CubeSat", exp: "यो १०x१०x१० से.मि. को सानो Nano-satellite हो। " },
        { id: 12, q: "Slippers2Sat को तौल कति रहेको छ?", o: ["करिब १.० केजी", "करिब १.२ केजी", "करिब १.५ केजी", "करिब २.० केजी"], cor: "करिब १.२ केजी", exp: "यो धेरै हलुका र सानो स्याटेलाइट हो।" },
        { id: 13, q: "Slippers2Sat को भौतिक आकार (Shape) कस्तो रहेको छ?", o: ["वर्गाकार (Cube)", "गोलाकार (Spherical)", "नली आकारको (Tube-shaped)", "पिरामिड आकारको"], cor: "नली आकारको (Tube-shaped)", exp: "यसको विशेष 'Tube-shaped' डिजाइनका कारण यसलाई Slippers2Sat भनिएको हो।" }
    ];

    // --- MISTAKE BANK LOGIC ---
    function getMistakes() { return JSON.parse(localStorage.getItem('spaceMistakes')) || []; }
    function saveMistake(q) {
        let bank = getMistakes();
        if(!bank.some(i => i.id === q.id)) {
            bank.push(q);
            localStorage.setItem('spaceMistakes', JSON.stringify(bank));
        }
        updateHomeUI();
    }
    function removeMistake(id) {
        let bank = getMistakes().filter(i => i.id !== id);
        localStorage.setItem('spaceMistakes', JSON.stringify(bank));
        updateHomeUI();
    }
    function updateHomeUI() {
        let bank = getMistakes();
        let btn = document.getElementById('home-retry-btn');
        let info = document.getElementById('mistake-count');
        if(bank.length > 0) {
            btn.style.display = 'block';
            info.innerText = `Orbiting Mistakes: ${bank.length}`;
        } else {
            btn.style.display = 'none';
            info.innerText = "All Systems Nominal. No Mistakes.";
        }
    }

    // --- GAME ENGINE ---
    let currentQuiz = [], score = 0, current = 0, time = 20 * 60, timerId, mode = 'full';

    function initQuiz(m) {
        mode = m;
        document.getElementById('home-view').style.display = 'none';
        document.getElementById('quiz-view').style.display = 'flex';
        
        let source = (mode === 'full') ? rawData : getMistakes();
        currentQuiz = source.map(shuffleOptions).sort(() => 0.5 - Math.random());
        
        current = 0; score = 0; time = 20 * 60;
        startTimer();
        renderQuestion();
    }

    function shuffleOptions(item) {
        let opts = [...item.o];
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        return { ...item, o: opts, ai: opts.indexOf(item.cor) };
    }

    function startTimer() {
        clearInterval(timerId);
        timerId = setInterval(() => {
            time--;
            let m = Math.floor(time / 60);
            let s = time % 60;
            document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
            if(time <= 0) finishQuiz();
        }, 1000);
    }

    function renderQuestion() {
        let q = currentQuiz[current];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('prog-text').innerText = `Question: ${current + 1} / ${currentQuiz.length}`;
        
        let box = document.getElementById('opt-container');
        box.innerHTML = '';
        
        q.o.forEach((opt, idx) => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            box.appendChild(btn);
        });
        
        document.getElementById('exp-box').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(idx, btn) {
        let q = currentQuiz[current];
        let btns = document.getElementsByClassName('option-btn');
        for(let b of btns) b.classList.add('locked');

        if(idx === q.ai) {
            score++;
            btn.classList.add('is-correct');
            if(mode === 'wrong') removeMistake(q.id);
            triggerFeedback("LIFTOFF!", "#10B981");
        } else {
            btn.classList.add('is-wrong');
            btns[q.ai].classList.add('is-correct');
            saveMistake(rawData.find(i => i.id === q.id));
            triggerFeedback("MALFUNCTION", "#EF4444");
        }
        
        document.getElementById('exp-box').innerHTML = "<strong>Explanation:</strong> " + q.exp;
        document.getElementById('exp-box').style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function triggerFeedback(t, c) {
        let f = document.getElementById('firework-overlay');
        f.innerText = t; f.style.color = c; f.style.opacity = 1;
        setTimeout(() => f.style.opacity = 0, 800);
    }

    function nextQuestion() {
        current++;
        if(current < currentQuiz.length) renderQuestion();
        else finishQuiz();
    }

    function finishQuiz() {
        clearInterval(timerId);
        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'flex';
        document.getElementById('final-score').innerText = score;
        document.getElementById('accuracy-text').innerText = "Accuracy: " + Math.round((score/currentQuiz.length)*100) + "%";
        updateHomeUI();
    }

    updateHomeUI();
</script>
</body>
</html>
